<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }

        video {
            position: absolute;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            top: 0;
            left: 0;
            transition: opacity 0.2s ease;
        }

        #label {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 10;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 6px 10px;
            border-radius: 5px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>

<div id="label">Feed A</div>
<video id="video" autoplay muted loop playsinline></video>

<script>
const feeds = ["A","B","C"];
let currentFeed = 0;
let scrollCount = 0;

// ✅ MATCHES YOUR GITHUB STRUCTURE (ROOT FILES)
const videos = [
    "12146364_1080_1920_60fps.mp4",
    "13404872_1080_1920_60fps.mp4",
    "15823028_1080_1920_30fps.mp4",
    "7334473-hd_1080_1920_25fps.mp4",
    "8034250-hd_1080_1920_30fps.mp4"
];

let currentIndex = 0;

const videoEl = document.getElementById("video");
const label = document.getElementById("label");

// --- LOAD VIDEO ---
function showVideo(index){
    videoEl.style.opacity = 0;

    let delay = 0;

    // Feed B → explicit friction
    if(feeds[currentFeed]==="B"){
        delay = 800;
        label.innerText = "Pause...";
    }

    // Feed C → implicit friction
    if(feeds[currentFeed]==="C"){
        delay = Math.random()*1000;
    }

    // progressive fatigue friction
    let fatigue = Math.min(scrollCount * 40, 400);
    delay += fatigue;

    setTimeout(()=>{
        const file = videos[index % videos.length];

        videoEl.src = file;
        videoEl.load();
        videoEl.play();

        videoEl.style.opacity = 1;
        label.innerText = "Feed " + feeds[currentFeed];
    }, delay);
}

// --- NEXT VIDEO ---
function nextVideo(){
    scrollCount++;

    currentIndex = Math.floor(Math.random()*videos.length);

    logInteraction();
    showVideo(currentIndex);
}

// --- SWIPE ---
let startX=0, startY=0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    if(Math.abs(dy)>Math.abs(dx)){
        if(dy < -50) nextVideo();
    } else {
        if(dx > 50) switchFeed(-1);
        if(dx < -50) switchFeed(1);
    }
});

// --- SWITCH FEED ---
function switchFeed(dir){
    currentFeed += dir;

    if(currentFeed < 0) currentFeed = feeds.length-1;
    if(currentFeed >= feeds.length) currentFeed = 0;

    label.innerText = "Feed " + feeds[currentFeed];
}

// --- LOGGING (for study) ---
let logs = [];

function logInteraction(){
    logs.push({
        time: Date.now(),
        feed: feeds[currentFeed],
        index: currentIndex,
        scrollCount: scrollCount
    });

    console.log(logs);
}

// INIT
showVideo(currentIndex);

</script>

</body>

</html>
