<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
}

video {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    top: 0;
    left: 0;
}

#label {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 6px 10px;
    z-index: 10;
}
</style>
</head>

<body>

<div id="label">Feed A</div>
<video id="video" autoplay muted playsinline loop></video>

<script>
const feeds = ["A","B","C"];
let currentFeed = 0;
let scrollCount = 0;

// ✅ ALL YOUR VIDEOS
const videos = [
"12146364_1080_1920_60fps.mp4",
"13404872_1080_1920_60fps.mp4",
"14677839_1920_1080_60fps.mp4",
"14909964_3840_2160_50fps.mp4",
"15823028_1080_1920_30fps.mp4",
"3064219-hd_1920_1080_24fps.mp4",
"7334473-hd_1080_1920_25fps.mp4",
"8034250-hd_1080_1920_30fps.mp4",
"8480433-hd_1920_1080_25fps.mp4",
"8811045-hd_1920_1080_25fps.mp4",
"PartyFun.mp4"
];

let currentIndex = 0;

const video = document.getElementById("video");
const label = document.getElementById("label");

// --- LOAD VIDEO SAFELY ---
function loadVideo(index){

    const file = videos[index % videos.length];

    video.src = file;
    video.load();

    video.play().catch(() => {
        console.log("Autoplay blocked, retry");
    });
}

// --- MAIN SWITCH ---
function nextVideo(){

    scrollCount++;

    let delay = 0;

    if(feeds[currentFeed]==="B") delay = 700;
    if(feeds[currentFeed]==="C") delay = Math.random()*900;

    let fatigue = Math.min(scrollCount*40, 400);
    delay += fatigue;

    setTimeout(()=>{

        currentIndex = (currentIndex + 1) % videos.length;

        loadVideo(currentIndex);

        label.innerText = "Feed " + feeds[currentFeed];

    }, delay);
}

// --- HANDLE VIDEO FAIL (CRITICAL) ---
video.addEventListener("error", ()=>{
    console.log("Video failed, skipping...");
    nextVideo();
});

// --- SWIPE ---
let startX=0, startY=0;

document.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e=>{
    let dx = e.changedTouches[0].clientX - startX;
    let dy = e.changedTouches[0].clientY - startY;

    if(Math.abs(dy)>Math.abs(dx)){
        if(dy < -50) nextVideo();
    } else {
        if(dx > 50) switchFeed(-1);
        if(dx < -50) switchFeed(1);
    }
});

// --- SWITCH FEED ---
function switchFeed(dir){
    currentFeed += dir;

    if(currentFeed<0) currentFeed = feeds.length-1;
    if(currentFeed>=feeds.length) currentFeed=0;

    label.innerText = "Feed " + feeds[currentFeed];
}

// INIT
loadVideo(0);
</script>

</body>

</html>
